[build]
  publish = "."

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"
  included_files = ["data/**", "src/**"]

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "POST, GET, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
